<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Питомец</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="js/data.js"></script>
<style>
/* ═══════════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════════ */
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#05060f;
  font-family:'Segoe UI',system-ui,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

/* ═══════════════════════════════════════════════════════
   STAGE COLOR TOKENS
═══════════════════════════════════════════════════════ */
:root{
  /* Stage palettes */
  --s2-body:#5cbe67;--s2-dark:#2e7a36;--s2-mid:#42a050;--s2-light:#a8e6ad;
  --s2-glow:rgba(92,190,103,.55);--s2-orb:#aaff88;--s2-pupil:#1a4a20;
  --s2-cheek:rgba(255,130,130,.35);

  --s3-body:#3a9ee8;--s3-dark:#1355a0;--s3-mid:#2878c0;--s3-light:#90caf9;
  --s3-glow:rgba(58,158,232,.55);--s3-orb:#66d4ff;--s3-pupil:#0a2d5a;
  --s3-cheek:rgba(100,180,255,.3);

  --s4-body:#b44fd4;--s4-dark:#6a1a8a;--s4-mid:#8a30a8;--s4-light:#e0b0f0;
  --s4-glow:rgba(180,79,212,.55);--s4-orb:#dd99ff;--s4-pupil:#3d0a5a;
  --s4-cheek:rgba(220,120,255,.3);

  --s5-body:#f0c030;--s5-dark:#b06000;--s5-mid:#d08818;--s5-light:#fff0a0;
  --s5-glow:rgba(240,192,48,.6);--s5-orb:#ffffff;--s5-pupil:#5a2800;
  --s5-cheek:rgba(255,200,80,.35);

  /* Active vars (set by JS) — fallback = stage 2 green */
  --body-mid:#5cbe67;--body-dark:#2e7a36;--body-light:#a8e6ad;
  --body-glow:rgba(92,190,103,.55);--orb-color:#aaff88;--pupil-color:#1a4a20;
  --cheek-color:rgba(255,130,130,.35);
  --pet-glow:rgba(92,190,103,.4);
  --xp-a:#5cbe67;--xp-b:#a8e6ad;--dot-color:#5cbe67;
}

/* ═══════════════════════════════════════════════════════
   UNIVERSE LAYOUT
═══════════════════════════════════════════════════════ */
.universe{
  position:relative;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;
  overflow:hidden;
}

/* Canvas stars */
#starsCanvas{position:absolute;inset:0;z-index:0;pointer-events:none}

/* ── Nebula (env ≥ 2) ── */
.nebula{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  opacity:0;transition:opacity 1.8s ease;
}
.nebula.visible{opacity:1}
.nebula::before,.nebula::after{content:'';position:absolute;border-radius:50%;filter:blur(70px)}
.nebula::before{
  width:60%;height:60%;top:-15%;left:-20%;
  background:radial-gradient(circle,rgba(120,60,220,.28) 0%,transparent 70%);
  animation:nebula-drift 18s ease-in-out infinite alternate;
}
.nebula::after{
  width:50%;height:50%;bottom:-8%;right:-12%;
  background:radial-gradient(circle,rgba(30,160,200,.22) 0%,transparent 70%);
  animation:nebula-drift 22s ease-in-out infinite alternate-reverse;
}
@keyframes nebula-drift{
  0%{transform:scale(1) translate(0,0)}
  100%{transform:scale(1.15) translate(15px,-10px)}
}

/* ── Galaxy core (env ≥ 3) ── */
.galaxy-core{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);
  width:340px;height:340px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,230,100,.08) 0%,rgba(200,120,255,.06) 40%,transparent 70%);
  filter:blur(28px);z-index:1;pointer-events:none;
  opacity:0;transition:opacity 2s ease;
  animation:galaxy-spin 60s linear infinite;
}
.galaxy-core.visible{opacity:1}
@keyframes galaxy-spin{to{transform:translate(-50%,-55%) rotate(360deg)}}

/* ── Planet (env ≥ 1) ── */
.planet{
  position:absolute;bottom:-100px;right:-70px;
  width:220px;height:220px;border-radius:50%;
  background:
    radial-gradient(circle at 62% 68%,rgba(0,0,0,.5) 0%,transparent 50%),
    radial-gradient(circle at 35% 30%,#6ab8ff 0%,#1a3a7a 60%,#0d1f44 100%);
  box-shadow:0 0 70px rgba(74,159,255,.3),inset -18px -18px 44px rgba(0,0,0,.55);
  z-index:1;pointer-events:none;
  opacity:0;transition:opacity 1.4s ease;
}
.planet.visible{opacity:1}
/* atmosphere */
.planet::before{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,rgba(100,200,255,.15) 0%,transparent 60%);
  filter:blur(12px);
}
/* ring */
.planet::after{
  content:'';position:absolute;
  width:136%;height:24%;top:38%;left:-18%;
  background:linear-gradient(transparent 20%,rgba(74,159,255,.18) 50%,transparent 80%);
  border-radius:50%;transform:rotateX(68deg);
}

/* ─────────────────────────────────────────────────────
   PET SCENE
───────────────────────────────────────────────────── */
.pet-scene{
  position:relative;z-index:10;
  flex:1;display:flex;align-items:center;justify-content:center;
  width:100%;
  padding-top:env(safe-area-inset-top,0px);
}

/* Ground shadow — pulses inverse to float */
.pet-shadow{
  position:absolute;
  bottom:8%;left:50%;transform:translateX(-50%);
  width:130px;height:18px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(0,0,0,.38) 0%,transparent 70%);
  animation:shadow-pulse 3.2s ease-in-out infinite;
  pointer-events:none;z-index:5;
}
@keyframes shadow-pulse{
  0%,100%{transform:translateX(-50%) scaleX(1.05);opacity:.45}
  50%     {transform:translateX(-50%) scaleX(.60);opacity:.12}
}

/* ─────────────────────────────────────────────────────
   ALIEN WRAP — float with SQUISH / STRETCH
───────────────────────────────────────────────────── */
.alien-wrap{
  position:relative;display:flex;flex-direction:column;align-items:center;
  transform-origin:center bottom;
  animation:float 3.2s ease-in-out infinite;
  filter:drop-shadow(0 10px 36px var(--pet-glow,rgba(100,200,255,.4)));
  cursor:pointer;
  user-select:none;
}
@keyframes float{
  0%,100%{
    transform:translateY(0) scaleX(1.04) scaleY(0.96);
    animation-timing-function:cubic-bezier(.33,0,.66,0);
  }
  50%{
    transform:translateY(-24px) scaleX(0.95) scaleY(1.06);
    animation-timing-function:cubic-bezier(.33,1,.66,1);
  }
}

/* Orbit sparkles around the character */
.orbit-dot{
  position:absolute;
  width:var(--od-size,7px);height:var(--od-size,7px);
  border-radius:50%;
  background:var(--orb-color,#4af);
  box-shadow:0 0 8px var(--orb-color,#4af),0 0 16px var(--orb-color,#4af);
  top:50%;left:50%;
  margin:calc(var(--od-size,7px) / -2) 0 0 calc(var(--od-size,7px) / -2);
  animation:orbit-spin var(--od-speed,5s) linear var(--od-delay,0s) infinite;
  pointer-events:none;opacity:.75;
}
@keyframes orbit-spin{
  from{transform:rotate(0deg) translateX(var(--od-r,85px))}
  to  {transform:rotate(360deg) translateX(var(--od-r,85px))}
}

/* ─────────────────────────────────────────────────────
   ANIMATION STATES
───────────────────────────────────────────────────── */

/* Tap bounce */
.alien-wrap.tap{
  animation:tap-squish .5s cubic-bezier(.34,1.56,.64,1) !important;
}
@keyframes tap-squish{
  0%  {transform:scaleX(1) scaleY(1)}
  25% {transform:scaleX(0.88) scaleY(1.14)}
  55% {transform:scaleX(1.1) scaleY(0.88)}
  75% {transform:scaleX(0.97) scaleY(1.04)}
  100%{transform:scaleX(1) scaleY(1)}
}

/* Eating */
.alien-wrap.eating{
  animation:eat-nom .45s ease-in-out 4,float 3.2s ease-in-out infinite 1.8s;
}
@keyframes eat-nom{
  0%,100%{transform:translateY(0) scaleX(1.04) scaleY(0.96)}
  30%    {transform:translateY(-16px) scaleX(0.95) scaleY(1.08)}
  60%    {transform:translateY(3px)  scaleX(1.08) scaleY(0.92)}
}

/* Celebrating — BIG jumps */
.alien-wrap.celebrating{
  animation:celebrate-jump .5s cubic-bezier(.34,1.56,.64,1) 5,float 3.2s ease-in-out infinite 2.5s;
}
@keyframes celebrate-jump{
  0%  {transform:translateY(0)  scaleX(1.05) scaleY(0.94)}
  30% {transform:translateY(-36px) scaleX(0.92) scaleY(1.10)}
  60% {transform:translateY(5px)  scaleX(1.10) scaleY(0.90)}
  80% {transform:translateY(-4px) scaleX(0.97) scaleY(1.04)}
  100%{transform:translateY(0)  scaleX(1) scaleY(1)}
}

/* Sleeping */
.alien-wrap.sleeping{
  animation:sleep-sway 4s ease-in-out infinite;
  filter:drop-shadow(0 6px 22px rgba(80,80,180,.3)) brightness(.8);
}
@keyframes sleep-sway{
  0%,100%{transform:rotate(-5deg) translateY(0)}
  50%    {transform:rotate(5deg)  translateY(5px)}
}

/* Level-up */
.alien-wrap.levelup{
  animation:levelup-explode .8s ease forwards,float 3.2s ease-in-out infinite .8s;
}
@keyframes levelup-explode{
  0%  {transform:scale(1);filter:brightness(1)}
  20% {transform:scale(.8);filter:brightness(.8)}
  50% {transform:scale(1.7);filter:brightness(4) saturate(2.5) hue-rotate(20deg)}
  70% {transform:scale(.88);filter:brightness(1.8)}
  100%{transform:scale(1);filter:brightness(1)}
}

/* ─────────────────────────────────────────────────────
   UFO  (stage 1)
───────────────────────────────────────────────────── */
.ufo{display:none;flex-direction:column;align-items:center;position:relative}
.ufo.active{display:flex}

.ufo__dome{
  width:80px;height:50px;
  background:
    radial-gradient(ellipse at 38% 32%,rgba(255,255,255,.65) 0%,rgba(140,220,255,.35) 45%,rgba(80,160,220,.15) 75%,transparent 100%);
  border:1.5px solid rgba(140,220,255,.55);
  border-radius:50% 50% 0 0;
  box-shadow:0 0 30px rgba(100,200,255,.4),inset 0 -4px 12px rgba(140,220,255,.2);
  position:relative;z-index:2;overflow:hidden;
}
/* Dome glare */
.ufo__dome::before{
  content:'';position:absolute;
  width:28px;height:28px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.55) 0%,transparent 70%);
  top:12%;left:20%;
}
/* Tiny cockpit window */
.ufo__dome::after{
  content:'';position:absolute;
  width:30px;height:22px;border-radius:50%;
  background:radial-gradient(ellipse at 40% 35%,rgba(0,200,255,.5) 0%,rgba(0,80,180,.6) 100%);
  border:1px solid rgba(100,220,255,.4);
  bottom:6px;left:50%;transform:translateX(-50%);
  box-shadow:inset 0 0 8px rgba(0,220,255,.5);
}

.ufo__disc{
  width:160px;height:52px;
  background:
    radial-gradient(ellipse at 50% 0%,rgba(255,255,255,.25) 0%,transparent 55%),
    linear-gradient(180deg,#d0d4e8 0%,#9094ac 42%,#6c7090 72%,#505268 100%);
  border-radius:50%;
  margin-top:-7px;z-index:1;position:relative;
  box-shadow:0 8px 28px rgba(0,0,0,.6),0 0 50px rgba(100,200,255,.22),inset 0 3px 8px rgba(255,255,255,.15);
}
/* Disc highlight stripe */
.ufo__disc::before{
  content:'';position:absolute;
  width:60%;height:3px;border-radius:2px;
  background:rgba(255,255,255,.22);
  top:22%;left:20%;
}

.ufo__lights{
  position:absolute;top:50%;transform:translateY(-50%);
  width:100%;display:flex;justify-content:space-evenly;padding:0 14px;
}
.ufo__light{
  width:14px;height:14px;border-radius:50%;
  animation:light-cycle 1.8s linear infinite;
}
.ufo__light:nth-child(1){animation-delay:0s}
.ufo__light:nth-child(2){animation-delay:.36s}
.ufo__light:nth-child(3){animation-delay:.72s}
.ufo__light:nth-child(4){animation-delay:1.08s}
.ufo__light:nth-child(5){animation-delay:1.44s}
@keyframes light-cycle{
  0%,19% {background:#ff4d6d;box-shadow:0 0 10px #ff4d6d,0 0 20px #ff4d6d}
  20%,39%{background:#4dff88;box-shadow:0 0 10px #4dff88,0 0 20px #4dff88}
  40%,59%{background:#4daeff;box-shadow:0 0 10px #4daeff,0 0 20px #4daeff}
  60%,79%{background:#ffe44d;box-shadow:0 0 10px #ffe44d,0 0 20px #ffe44d}
  80%,100%{background:#dd44ff;box-shadow:0 0 10px #dd44ff,0 0 20px #dd44ff}
}

/* Beam */
.ufo__beam{
  position:relative;
  width:0;height:0;
  border-left:48px solid transparent;
  border-right:48px solid transparent;
  border-top:80px solid rgba(100,210,255,.18);
  margin-top:-2px;
  filter:blur(12px);
  animation:beam-pulse 2s ease-in-out infinite;
  overflow:hidden;
}
/* Scan line inside beam */
.ufo__beam::before{
  content:'';position:absolute;
  width:60px;height:3px;
  background:rgba(100,210,255,.7);
  top:0;left:-30px;
  animation:beam-scan 2s linear infinite;
}
@keyframes beam-pulse{
  0%,100%{opacity:.35;transform:scaleX(1)}
  50%    {opacity:.65;transform:scaleX(.78)}
}
@keyframes beam-scan{
  0%  {top:0;opacity:.8}
  100%{top:80px;opacity:0}
}

/* ─────────────────────────────────────────────────────
   ALIEN CHARACTER  (stages 2–5)
───────────────────────────────────────────────────── */
.char{display:none;flex-direction:column;align-items:center;position:relative}
.char.active{display:flex}

/* Ambient glow behind */
.char__glow{
  position:absolute;
  width:160px;height:140px;border-radius:50%;
  background:radial-gradient(circle,var(--body-glow) 0%,transparent 70%);
  filter:blur(40px);
  top:20px;left:50%;transform:translateX(-50%);
  animation:glow-breathe 2.8s ease-in-out infinite;
  z-index:0;pointer-events:none;
}
@keyframes glow-breathe{
  0%,100%{opacity:.55;transform:translateX(-50%) scale(1)}
  50%    {opacity:.9;transform:translateX(-50%) scale(1.15)}
}

/* ── Antenna ── */
.char__ant{
  position:relative;width:5px;height:38px;
  background:linear-gradient(to top,var(--body-dark),var(--body-mid));
  border-radius:3px;margin-bottom:-4px;z-index:5;
  transform-origin:bottom center;
  animation:ant-sway 2.2s ease-in-out infinite;
  box-shadow:0 0 6px rgba(0,0,0,.2);
}
@keyframes ant-sway{
  0%,100%{transform:rotate(-10deg)}
  50%    {transform:rotate(10deg)}
}
.char__orb{
  position:absolute;width:18px;height:18px;
  border-radius:50%;top:-9px;left:50%;transform:translateX(-50%);
  background:radial-gradient(circle at 35% 30%,#fff 0%,var(--orb-color) 50%,rgba(0,0,0,.15) 100%);
  box-shadow:0 0 12px var(--orb-color),0 0 24px var(--orb-color),0 0 40px rgba(255,255,255,.15);
  animation:orb-pulse 1.6s ease-in-out infinite;
}
@keyframes orb-pulse{
  0%,100%{box-shadow:0 0 12px var(--orb-color),0 0 24px var(--orb-color)}
  50%    {box-shadow:0 0 18px var(--orb-color),0 0 38px var(--orb-color),0 0 60px rgba(255,255,255,.2)}
}
/* Tiny inner sparkle */
.char__orb::after{
  content:'';position:absolute;
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.9);
  top:3px;left:3px;
}

/* ── Head ── */
.char__head{
  position:relative;
  width:144px;height:128px;z-index:2;
  background:radial-gradient(ellipse at 32% 26%,var(--body-light) 0%,var(--body-mid) 45%,var(--body-dark) 100%);
  border-radius:54% 54% 46% 46%;
  box-shadow:
    0 10px 30px rgba(0,0,0,.45),
    inset 0 -10px 22px rgba(0,0,0,.22),
    inset 0 4px 12px rgba(255,255,255,.12),
    0 0 55px var(--body-glow);
}

/* ── Eyes ── */
.char__eye{
  position:absolute;top:32%;
  width:44px;height:44px;
  background:radial-gradient(circle at 38% 32%,#ffffff 0%,#f0f0f0 70%,#e0e0e0 100%);
  border-radius:50%;overflow:visible;
  box-shadow:0 3px 10px rgba(0,0,0,.4),inset 0 2px 4px rgba(255,255,255,.8);
  animation:blink 5.5s ease-in-out infinite;
}
.char__eye--l{left:12%}
.char__eye--r{right:12%}
@keyframes blink{
  0%,85%,100%{transform:scaleY(1)}
  90%        {transform:scaleY(.05)}
  92%        {transform:scaleY(1)}
  95%        {transform:scaleY(.08)}
}

/* Iris ring */
.char__iris{
  position:absolute;
  width:32px;height:32px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,var(--body-light) 0%,var(--body-mid) 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  box-shadow:0 0 4px rgba(0,0,0,.2);
}

/* Pupil */
.char__pupil{
  position:absolute;
  width:22px;height:22px;border-radius:50%;
  background:radial-gradient(circle at 36% 28%,rgba(255,255,255,.15) 0%,var(--pupil-color) 55%,rgba(0,0,0,.3) 100%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:pupil-wander 8s ease-in-out infinite;
  z-index:2;
}
@keyframes pupil-wander{
  0%,100%{transform:translate(-50%,-50%)}
  15%    {transform:translate(-36%,-62%)}
  30%    {transform:translate(-62%,-44%)}
  50%    {transform:translate(-50%,-50%)}
  65%    {transform:translate(-40%,-58%)}
  80%    {transform:translate(-60%,-46%)}
}

/* Shine dots */
.char__shine{position:absolute;border-radius:50%;background:rgba(255,255,255,.92)}
.char__shine--1{width:8px;height:8px;top:10%;right:8%}
.char__shine--2{width:4px;height:4px;top:30%;right:26%;opacity:.7}

/* Eye states */
.eating .char__eye{
  transform:scaleY(.28) !important;
  animation:blink-happy .25s ease-in-out 8 !important;
  border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
}
@keyframes blink-happy{0%,100%{transform:scaleY(.28)}50%{transform:scaleY(.1)}}

.sleeping .char__eye{
  animation:none !important;
  transform:scaleY(.08) !important;
  background:linear-gradient(to bottom,rgba(0,0,0,.1),rgba(0,0,0,.03));
}

.celebrating .char__eye{
  animation:sparkle-eye .3s ease-in-out 10 !important;
}
@keyframes sparkle-eye{
  0%,100%{transform:scaleY(1) scaleX(1)}
  50%    {transform:scaleY(1.15) scaleX(1.08)}
}

/* ── Cheeks ── */
.char__cheek{
  position:absolute;
  width:34px;height:18px;border-radius:50%;
  bottom:22%;
  background:var(--cheek-color,rgba(255,130,130,.35));
  filter:blur(6px);
  animation:blush-pulse 3.5s ease-in-out infinite;
}
.char__cheek--l{left:4%}
.char__cheek--r{right:4%}
@keyframes blush-pulse{
  0%,100%{opacity:.7}
  50%    {opacity:1}
}

/* Eating cheeks — bright */
.eating .char__cheek{opacity:1.3;filter:blur(5px)}

/* ── Mouth ── */
.char__mouth{
  position:absolute;bottom:16%;left:50%;transform:translateX(-50%);
  width:36px;height:2px;
  border:3px solid rgba(0,0,0,.32);
  border-top-color:transparent;
  border-radius:0 0 36px 36px;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
}
.eating .char__mouth{
  width:30px;height:22px;
  border-radius:0 0 30px 30px;
  background:radial-gradient(ellipse,rgba(0,0,0,.18) 0%,transparent 100%);
  border-color:rgba(0,0,0,.32);
  transform:translateX(-50%) scaleX(1.1);
}
.celebrating .char__mouth{
  width:42px;height:8px;
  border-radius:0 0 42px 42px;
  border-width:3.5px;
  border-color:rgba(0,0,0,.35);
}
.sleeping .char__mouth{
  border-radius:36px 36px 0 0;
  border-top-color:rgba(0,0,0,.28);
  border-bottom-color:transparent;
  width:24px;
}

/* ── Body ── */
.char__body{
  position:relative;width:80px;height:56px;z-index:2;
  background:
    radial-gradient(ellipse at 30% 25%,rgba(255,255,255,.18) 0%,transparent 55%),
    radial-gradient(ellipse at 35% 30%,var(--body-mid) 0%,var(--body-dark) 100%);
  border-radius:50%;margin-top:-8px;
  box-shadow:0 5px 22px rgba(0,0,0,.35),inset 0 3px 8px rgba(255,255,255,.1);
  animation:breathe 2.8s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{transform:scaleX(1) scaleY(1)}
  50%    {transform:scaleX(1.04) scaleY(1.06)}
}

/* Belly light spot */
.char__belly{
  position:absolute;
  width:28px;height:22px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,rgba(255,255,255,.25) 0%,transparent 75%);
  top:18%;left:50%;transform:translateX(-50%);
}

/* ── Arms ── */
.char__arm{
  position:absolute;
  width:30px;height:13px;
  background:linear-gradient(to right,var(--body-dark),var(--body-mid));
  border-radius:50%;
  box-shadow:0 3px 8px rgba(0,0,0,.28);
  top:30%;
  transform-origin:center center;
}
.char__arm--l{
  left:-24px;transform:rotate(25deg);
  animation:arm-l 2.8s ease-in-out infinite;
}
.char__arm--r{
  right:-24px;transform:rotate(-25deg);
  animation:arm-r 2.8s ease-in-out infinite .7s;
}
@keyframes arm-l{
  0%,100%{transform:rotate(25deg)}
  50%    {transform:rotate(42deg)}
}
@keyframes arm-r{
  0%,100%{transform:rotate(-25deg)}
  50%    {transform:rotate(-42deg)}
}
/* tiny hand */
.char__arm::after{
  content:'';position:absolute;
  width:11px;height:11px;border-radius:50%;
  background:var(--body-mid);
  box-shadow:0 2px 4px rgba(0,0,0,.2);
  top:50%;right:-3px;transform:translateY(-50%);
}

/* Celebrating: arms UP */
.celebrating .char__arm--l{animation:arm-l-up .35s ease-in-out 10 alternate !important}
.celebrating .char__arm--r{animation:arm-r-up .35s ease-in-out 10 alternate !important}
@keyframes arm-l-up{to{transform:rotate(-55deg)}}
@keyframes arm-r-up{to{transform:rotate(55deg)}}

/* ── Feet ── */
.char__feet{
  display:flex;gap:16px;
  margin-top:-4px;z-index:1;
  position:relative;
}
.char__foot{
  width:26px;height:15px;border-radius:50%;
  background:radial-gradient(ellipse at 35% 30%,var(--body-mid) 0%,var(--body-dark) 100%);
  box-shadow:0 4px 10px rgba(0,0,0,.35);
}

/* ── Stage 5 crown ── */
.char__crown{
  display:none;position:absolute;
  top:-36px;left:50%;transform:translateX(-50%);
  font-size:26px;
  animation:crown-float 2.2s ease-in-out infinite,crown-glow 2.2s ease-in-out infinite;
  z-index:6;filter:drop-shadow(0 0 8px rgba(255,200,0,.8));
}
.char[data-stage="5"] .char__crown{display:block}
@keyframes crown-float{
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%    {transform:translateX(-50%) translateY(-7px)}
}
@keyframes crown-glow{
  0%,100%{filter:drop-shadow(0 0 6px rgba(255,200,0,.7))}
  50%    {filter:drop-shadow(0 0 18px rgba(255,200,0,1)) brightness(1.3)}
}

/* ─────────────────────────────────────────────────────
   ZZZ
───────────────────────────────────────────────────── */
.zzz-wrap{
  position:absolute;top:-16px;right:-38px;
  display:flex;flex-direction:column;align-items:flex-start;gap:3px;
  pointer-events:none;opacity:0;transition:opacity .8s;
}
.zzz-wrap.visible{opacity:1}
.zzz{
  font-weight:800;
  text-shadow:0 0 12px currentColor;
  animation:zzz-rise 2.8s ease-in-out infinite;
  font-style:italic;
}
.zzz:nth-child(1){font-size:14px;color:rgba(160,200,255,.75);animation-delay:0s}
.zzz:nth-child(2){font-size:20px;color:rgba(180,215,255,.85);animation-delay:.85s}
.zzz:nth-child(3){font-size:28px;color:rgba(200,230,255,.95);animation-delay:1.7s}
@keyframes zzz-rise{
  0%  {transform:translateY(0)   scale(.75) rotate(-5deg);opacity:0}
  12% {opacity:1}
  100%{transform:translateY(-80px) scale(1.4) rotate(10deg);opacity:0}
}

/* ─────────────────────────────────────────────────────
   MOOD EMOJI
───────────────────────────────────────────────────── */
.mood-emoji{
  position:absolute;font-size:32px;
  top:0;left:50%;
  transform:translateX(-50%);
  opacity:0;pointer-events:none;z-index:30;
}
.mood-emoji.pop{animation:mood-pop 1.6s ease forwards}
@keyframes mood-pop{
  0%  {opacity:0;transform:translateX(-50%) translateY(0)   scale(.4)}
  18% {opacity:1;transform:translateX(-50%) translateY(-28px) scale(1.25)}
  55% {opacity:1;transform:translateX(-50%) translateY(-42px) scale(1)}
  100%{opacity:0;transform:translateX(-50%) translateY(-70px) scale(.75)}
}

/* ─────────────────────────────────────────────────────
   PARTICLES
───────────────────────────────────────────────────── */
.particles{
  position:absolute;inset:0;pointer-events:none;z-index:20;overflow:visible;
}

.particle--coin{
  position:absolute;
  width:12px;height:12px;border-radius:50%;
  box-shadow:0 0 8px currentColor;
  animation:coin-fly var(--dur,.9s) ease-in forwards;
}
@keyframes coin-fly{
  0%  {transform:translate(var(--sx,0px),var(--sy,0px)) scale(1) rotate(0deg);opacity:1}
  100%{transform:translate(0,0) scale(0) rotate(220deg);opacity:0}
}

.particle--spark{
  position:absolute;
  border-radius:50%;
  box-shadow:0 0 8px var(--c,#fff),0 0 16px var(--c,#fff);
  background:var(--c,#fff);
  animation:spark-fly var(--dur,.7s) ease-out forwards;
}
@keyframes spark-fly{
  0%  {transform:translate(0,0) scale(1);opacity:1}
  70% {opacity:.8}
  100%{transform:translate(var(--dx,0px),var(--dy,-90px)) scale(0);opacity:0}
}

.particle--heart{
  position:absolute;font-size:var(--sz,16px);
  animation:heart-rise var(--dur,1.2s) ease-out forwards;
  pointer-events:none;
}
@keyframes heart-rise{
  0%  {transform:translate(var(--sx,0px),var(--sy,0px)) scale(.6) rotate(var(--rot,-15deg));opacity:1}
  60% {opacity:1}
  100%{transform:translate(var(--tx,0px),calc(var(--sy,0px) - 100px)) scale(1.2) rotate(var(--rot2,15deg));opacity:0}
}

/* Confetti for celebrate */
.particle--confetti{
  position:absolute;
  width:var(--w,8px);height:var(--h,5px);
  border-radius:2px;
  background:var(--c,#fff);
  animation:confetti-fall var(--dur,1.5s) ease-out forwards;
}
@keyframes confetti-fall{
  0%  {transform:translate(0,0) rotate(0deg);opacity:1}
  100%{transform:translate(var(--dx,0px),var(--dy,80px)) rotate(var(--spin,360deg));opacity:0}
}

/* Level-up ring */
.levelup-ring{
  position:absolute;border-radius:50%;
  border:4px solid rgba(255,255,255,.9);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:ring-expand .9s ease-out forwards;
  pointer-events:none;z-index:25;
}
@keyframes ring-expand{
  0%  {width:60px;height:60px;opacity:1;border-width:5px}
  100%{width:260px;height:260px;opacity:0;border-width:0}
}

/* ─────────────────────────────────────────────────────
   STATS PANEL — premium
───────────────────────────────────────────────────── */
.stats-panel{
  position:relative;z-index:10;
  width:100%;max-width:400px;
  padding:0 18px calc(22px + env(safe-area-inset-bottom,0px));
}

.stats-inner{
  background:rgba(12,12,22,.72);
  border:1px solid rgba(255,255,255,.11);
  border-radius:26px;
  padding:20px 22px 18px;
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  box-shadow:
    0 8px 40px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.1),
    0 0 0 1px rgba(255,255,255,.04),
    0 0 40px var(--pet-glow,rgba(100,200,255,.08));
  position:relative;overflow:hidden;
}
/* Inner shimmer overlay */
.stats-inner::before{
  content:'';position:absolute;inset:0;border-radius:26px;
  background:radial-gradient(ellipse at 20% 0%,rgba(255,255,255,.06) 0%,transparent 60%);
  pointer-events:none;
}

.stats-top{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;
}
.stats-level{
  font-size:20px;font-weight:800;
  color:#fff;letter-spacing:.5px;
  text-shadow:0 0 20px var(--pet-glow,rgba(100,200,255,.5));
}
.stats-streak{
  font-size:14px;font-weight:600;
  color:rgba(255,255,255,.8);
  background:rgba(255,255,255,.1);
  border-radius:20px;padding:4px 12px;
  border:1px solid rgba(255,255,255,.08);
}
.stats-streak.hot{
  color:#ffa040;
  background:rgba(255,160,64,.15);
  border-color:rgba(255,160,64,.25);
  text-shadow:0 0 10px rgba(255,160,64,.5);
}

/* XP bar */
.xp-track{
  width:100%;height:10px;
  background:rgba(255,255,255,.1);
  border-radius:10px;overflow:hidden;
  margin-bottom:6px;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.25);
}
.xp-fill{
  height:100%;border-radius:10px;
  background:linear-gradient(90deg,var(--xp-a,#4af),var(--xp-b,#8cf));
  box-shadow:0 0 14px var(--xp-a,#4af),0 2px 8px rgba(0,0,0,.2);
  transition:width .9s cubic-bezier(.34,1.2,.64,1);
  width:0%;position:relative;
}
/* XP bar shine */
.xp-fill::after{
  content:'';position:absolute;
  top:0;left:0;right:0;height:45%;
  background:rgba(255,255,255,.22);
  border-radius:10px 10px 0 0;
}
.xp-label{
  font-size:11px;color:rgba(255,255,255,.4);
  text-align:right;margin-bottom:12px;
  font-weight:500;
}

/* Week dots */
.week-info{display:flex;align-items:center;gap:8px}
.week-dots{display:flex;gap:6px}
.week-dot{
  width:12px;height:12px;border-radius:50%;
  background:rgba(255,255,255,.15);
  border:1.5px solid rgba(255,255,255,.08);
  transition:background .45s,box-shadow .45s,transform .25s;
}
.week-dot.filled{
  background:var(--dot-color,#4af);
  border-color:var(--dot-color,#4af);
  box-shadow:0 0 8px var(--dot-color,#4af),0 0 16px rgba(100,200,255,.25);
  transform:scale(1.15);
}
.week-label{font-size:12px;color:rgba(255,255,255,.45);font-weight:500}

/* Stage label */
.stage-label{
  text-align:center;font-size:11px;font-weight:700;
  color:var(--xp-a,rgba(255,255,255,.35));
  margin-top:12px;letter-spacing:1.5px;text-transform:uppercase;
  opacity:.7;
}

/* ─────────────────────────────────────────────────────
   PET NAME
───────────────────────────────────────────────────── */
.pet-name{
  position:relative;z-index:10;
  font-size:13px;font-weight:600;
  letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.38);
  padding-top:calc(12px + env(safe-area-inset-top,0px));
  margin-bottom:-8px;
  animation:name-glow 3s ease-in-out infinite;
}
@keyframes name-glow{
  0%,100%{text-shadow:0 0 8px var(--pet-glow,rgba(100,200,255,.3))}
  50%    {text-shadow:0 0 20px var(--pet-glow,rgba(100,200,255,.5)),0 0 40px var(--pet-glow,rgba(100,200,255,.2))}
}

/* ─────────────────────────────────────────────────────
   LOADING
───────────────────────────────────────────────────── */
.loading{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#05060f;
  gap:16px;

}
.loading.done{opacity:0;pointer-events:none}
.loader{

}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes loader-pulse{0%,100%{opacity:.3}50%{opacity:.7}}
</style>

<script>
/* ═══════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════ */
const HDRS = {'Content-Type':'application/json','ngrok-skip-browser-warning':'true'};

function getTelegramId(){
  const id = window.Telegram?.WebApp?.initDataUnsafe?.user?.id;
  if(id) return id;
  return new URLSearchParams(location.search).get('id') || null;
}

/* ═══════════════════════════════════════════════
   STAGE PALETTES
═══════════════════════════════════════════════ */
const STAGES = {
  1:{ name:'НЛО',
      bodyMid:'#8090b0',bodyDark:'#505a80',bodyLight:'#c0ccf0',
      bodyGlow:'rgba(100,160,255,.5)',orbColor:'#88ccff',pupilColor:'#102050',
      cheek:'rgba(160,200,255,.3)',
      xpa:'#44aaff',xpb:'#88ddff',dot:'#44aaff',petGlow:'rgba(100,180,255,.4)' },
  2:{ name:'Малыш',
      bodyMid:'#5cbe67',bodyDark:'#2e7a36',bodyLight:'#a8e6ad',
      bodyGlow:'rgba(92,190,103,.55)',orbColor:'#aaff88',pupilColor:'#1a4a20',
      cheek:'rgba(255,130,130,.38)',
      xpa:'#5cbe67',xpb:'#a8e6ad',dot:'#5cbe67',petGlow:'rgba(92,190,103,.4)' },
  3:{ name:'Странник',
      bodyMid:'#3a9ee8',bodyDark:'#1355a0',bodyLight:'#90caf9',
      bodyGlow:'rgba(58,158,232,.55)',orbColor:'#66d4ff',pupilColor:'#0a2d5a',
      cheek:'rgba(100,200,255,.3)',
      xpa:'#3a9ee8',xpb:'#90caf9',dot:'#3a9ee8',petGlow:'rgba(58,158,232,.4)' },
  4:{ name:'Маг',
      bodyMid:'#b44fd4',bodyDark:'#6a1a8a',bodyLight:'#e0b0f0',
      bodyGlow:'rgba(180,79,212,.55)',orbColor:'#dd99ff',pupilColor:'#3d0a5a',
      cheek:'rgba(220,120,255,.32)',
      xpa:'#b44fd4',xpb:'#e0b0f0',dot:'#b44fd4',petGlow:'rgba(180,79,212,.4)' },
  5:{ name:'Лорд',
      bodyMid:'#f0c030',bodyDark:'#b06000',bodyLight:'#fff0a0',
      bodyGlow:'rgba(240,192,48,.6)',orbColor:'#fffacc',pupilColor:'#5a2800',
      cheek:'rgba(255,190,60,.38)',
      xpa:'#f0c030',xpb:'#fff0a0',dot:'#f0c030',petGlow:'rgba(240,192,48,.45)' },
};

/* ═══════════════════════════════════════════════
   STAGE APPLY
═══════════════════════════════════════════════ */
function applyStage(stage){
  const ufoEl  = document.getElementById('ufo');
  const charEl = document.getElementById('char');
  const xpFill = document.getElementById('xpFill');
  const st     = STAGES[stage] || STAGES[2];
  const css    = document.documentElement.style;

  if(stage === 1){
    ufoEl.classList.add('active');
    charEl.classList.remove('active');
  } else {
    ufoEl.classList.remove('active');
    charEl.classList.add('active');
    charEl.setAttribute('data-stage', stage);
  }

  // Set all CSS vars directly (no chaining → always visible)
  css.setProperty('--body-mid',   st.bodyMid);
  css.setProperty('--body-dark',  st.bodyDark);
  css.setProperty('--body-light', st.bodyLight);
  css.setProperty('--body-glow',  st.bodyGlow);
  css.setProperty('--orb-color',  st.orbColor);
  css.setProperty('--pupil-color',st.pupilColor);
  css.setProperty('--cheek-color',st.cheek);
  css.setProperty('--pet-glow',   st.petGlow);
  css.setProperty('--xp-a',       st.xpa);
  css.setProperty('--xp-b',       st.xpb);
  css.setProperty('--dot-color',  st.dot);

  document.getElementById('stageLabel').textContent = st.name || '';
  document.getElementById('petName').textContent    = `NEBULA-${stage}`;
}

/* ═══════════════════════════════════════════════
   ENVIRONMENT
═══════════════════════════════════════════════ */
function applyEnv(env){
  document.getElementById('planet').classList.toggle('visible', env >= 1);
  document.getElementById('nebula').classList.toggle('visible', env >= 2);
  document.getElementById('galaxyCore').classList.toggle('visible', env >= 3);
}

/* ═══════════════════════════════════════════════
   STAR CANVAS — twinkling + shooting stars
═══════════════════════════════════════════════ */
function initStars(env, stageNum){
  const canvas = document.getElementById('starsCanvas');
  const ctx    = canvas.getContext('2d');
  const resize = ()=>{ canvas.width=innerWidth; canvas.height=innerHeight; };
  resize();
  window.addEventListener('resize', resize);

  // Stage tint for stars
  const tints = ['#aaccff','#aaffbb','#88ddff','#ddaaff','#ffe8aa'];
  const tint  = tints[(stageNum||1)-1] || '#aaccff';

  const counts = [140,220,360,520];
  const n = counts[Math.min(env,3)] || 140;

  // Build stars with color variations
  const stars = Array.from({length:n},()=>{
    const isColored = Math.random() < .25;
    return {
      x:     Math.random()*2000,   // init wide, resize handles it
      y:     Math.random()*3000,
      r:     Math.random()*1.8+.25,
      base:  Math.random()*.55+.2,
      speed: Math.random()*3+1,
      phase: Math.random()*Math.PI*2,
      color: isColored ? tint : '#ffffff',
    };
  });
  // Re-scatter on actual size
  const scatter = ()=>{
    stars.forEach(s=>{
      s.x = Math.random()*canvas.width;
      s.y = Math.random()*canvas.height;
    });
  };
  scatter();
  window.addEventListener('resize', scatter);

  // Shooting stars
  const shoots = [];
  let nextShoot = 4 + Math.random()*8; // seconds until first

  let t0=null;
  function draw(ts){
    if(!t0) t0=ts;
    const t=(ts-t0)/1000;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Regular stars
    stars.forEach(s=>{
      const a = s.base*(0.4+0.6*Math.sin(t/s.speed+s.phase));
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = s.color === '#ffffff'
        ? `rgba(255,255,255,${a})`
        : s.color.replace(')',`,${a})`).replace('rgb(','rgba(').replace('#','').replace(/^(..)(..)(..)$/,
            (_,r,g,b)=>`rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},${a})`);
      ctx.fill();
    });

    // Shooting stars
    if(t > nextShoot){
      shoots.push({
        x: Math.random()*canvas.width*.7 + canvas.width*.1,
        y: Math.random()*canvas.height*.4,
        vx: 250 + Math.random()*200,
        vy: 80 + Math.random()*100,
        life: 0, maxLife: .7+Math.random()*.5,
        color: Math.random()<.5 ? '#ffffff' : tint,
      });
      nextShoot = t + 5 + Math.random()*10;
    }
    shoots.forEach((s,i)=>{
      s.life += (ts - (t0 + (t-1/60)*1000)) / 1000; // approx
      // simple: advance by fixed frame
    });

    // Draw & update shoots
    for(let i=shoots.length-1;i>=0;i--){
      const s=shoots[i];
      s.x += s.vx/60; s.y += s.vy/60;
      s.life += 1/60;
      const p = s.life/s.maxLife;
      if(p>=1){ shoots.splice(i,1); continue; }
      const fade = p<.15 ? p/.15 : p>.7 ? 1-(p-.7)/.3 : 1;
      const tail = 60+40*fade;
      const grad = ctx.createLinearGradient(
        s.x-s.vx/60*tail/s.vx*s.vx/60*60, s.y-s.vy/60*tail/s.vy*s.vy/60*60,
        s.x, s.y
      );
      // Simplified trail
      const dx=-s.vx/60*(tail/60), dy=-s.vy/60*(tail/60);
      const g2=ctx.createLinearGradient(s.x+dx,s.y+dy,s.x,s.y);
      g2.addColorStop(0,'transparent');
      g2.addColorStop(1,`rgba(255,255,255,${.9*fade})`);
      ctx.beginPath();
      ctx.moveTo(s.x+dx, s.y+dy);
      ctx.lineTo(s.x, s.y);
      ctx.strokeStyle=g2;
      ctx.lineWidth=1.5*fade;
      ctx.stroke();
      // head dot
      ctx.beginPath();
      ctx.arc(s.x,s.y,2*fade,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${fade})`;
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

/* ═══════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════ */
const alienWrap = document.getElementById('alienWrap');

function playAnimation(anim){
  const zzz   = document.getElementById('zzzWrap');
  const parts = document.getElementById('particles');
  const mood  = document.getElementById('moodEmoji');

  // Clear all states
  alienWrap.classList.remove('eating','celebrating','sleeping','levelup','tap');
  zzz.classList.remove('visible');
  parts.innerHTML='';
  mood.classList.remove('pop');

  switch(anim){
    case 'eating':
      alienWrap.classList.add('eating');
      spawnCoins(parts);
      showMood('😋');
      break;
    case 'celebrating':
      alienWrap.classList.add('celebrating');
      spawnConfetti(parts);
      spawnSparks(parts, 24);
      showMood('🎉');
      break;
    case 'sleeping':
      alienWrap.classList.add('sleeping');
      zzz.classList.add('visible');
      showMood('💤', 3000);
      break;
    case 'levelup':
      alienWrap.classList.add('levelup');
      spawnSparks(parts, 40);
      for(let i=0;i<3;i++) setTimeout(()=>spawnRing(parts, i), i*260);
      showMood('⬆️');
      setTimeout(()=>alienWrap.classList.remove('levelup'),1200);
      break;
    default: break; // idle — just float
  }
}

function showMood(emoji, dur=1600){
  const el = document.getElementById('moodEmoji');
  void el.offsetWidth;
  el.textContent = emoji;
  el.classList.add('pop');
  setTimeout(()=>el.classList.remove('pop'), dur);
}

/* ── Tap interaction ── */
alienWrap.addEventListener('click', ()=>{
  if(alienWrap.classList.contains('eating') ||
     alienWrap.classList.contains('celebrating') ||
     alienWrap.classList.contains('sleeping') ||
     alienWrap.classList.contains('levelup')) return;

  alienWrap.style.animation = 'tap-squish .5s cubic-bezier(.34,1.56,.64,1)';
  spawnHearts(document.getElementById('particles'), 5);

  setTimeout(()=>{
    alienWrap.style.animation = '';
  }, 520);
});

/* ── Particles ── */
function spawnCoins(container){
  const colors=['#ffe566','#ffd000','#c6ff5e','#40d8ff','#ff9f40'];
  for(let i=0;i<14;i++){
    const el=document.createElement('div');
    el.className='particle particle--coin';
    const angle=Math.random()*Math.PI*2;
    const dist=50+Math.random()*70;
    const c=colors[i%colors.length];
    el.style.cssText=`
      left:50%;top:40%;
      width:${10+Math.random()*6}px;
      height:${10+Math.random()*6}px;
      background:radial-gradient(circle,${c},#b07000);
      color:${c};
      --sx:${Math.cos(angle)*dist}px;
      --sy:${Math.sin(angle)*dist}px;
      --dur:${.55+Math.random()*.5}s;
      animation-delay:${i*.07}s;
    `;
    container.appendChild(el);
  }
}

function spawnSparks(container, count=20){
  const colors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6fe8','#ffffff','#ffe566'];
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.className='particle particle--spark';
    const angle=Math.random()*Math.PI*2;
    const dist=55+Math.random()*110;
    const c=colors[Math.floor(Math.random()*colors.length)];
    const size=4+Math.random()*6;
    el.style.cssText=`
      left:50%;top:45%;
      width:${size}px;height:${size}px;
      --c:${c};
      --dx:${Math.cos(angle)*dist}px;
      --dy:${Math.sin(angle)*dist}px;
      --dur:${.45+Math.random()*.7}s;
      animation-delay:${i*.03}s;
    `;
    container.appendChild(el);
  }
}

function spawnHearts(container, count=6){
  const emojis=['❤️','💚','💙','💜','💛','🩷','✨'];
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.className='particle particle--heart';
    const ox=(Math.random()-.5)*80;
    el.style.cssText=`
      left:calc(50% + ${ox}px);
      top:30%;
      --sx:0px;
      --sy:0px;
      --tx:${(Math.random()-.5)*50}px;
      --rot:${(Math.random()-.5)*30}deg;
      --rot2:${(Math.random()-.5)*30}deg;
      --sz:${16+Math.random()*12}px;
      --dur:${1+Math.random()*.5}s;
      animation-delay:${i*.08}s;
    `;
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    container.appendChild(el);
  }
}

function spawnConfetti(container, count=32){
  const colors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6fe8','#fff','#ffa040','#aa44ff'];
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.className='particle particle--confetti';
    const w=5+Math.random()*8, h=3+Math.random()*6;
    const c=colors[Math.floor(Math.random()*colors.length)];
    const dx=(Math.random()-.5)*220;
    const dy=-40-Math.random()*140;
    el.style.cssText=`
      left:50%;top:40%;
      --w:${w}px;--h:${h}px;--c:${c};
      --dx:${dx}px;--dy:${dy}px;
      --spin:${(Math.random()>.5?1:-1)*(180+Math.random()*360)}deg;
      --dur:${.9+Math.random()*.8}s;
      animation-delay:${i*.04}s;
      border-radius:${Math.random()>0.5?'2px':'50%'};
    `;
    container.appendChild(el);
  }
}

function spawnRing(container, idx=0){
  const r=document.createElement('div');
  r.className='levelup-ring';
  const colors=['rgba(255,255,255,.9)','rgba(100,200,255,.8)','rgba(200,100,255,.7)'];
  r.style.cssText=`border-color:${colors[idx]};`;
  container.appendChild(r);
  setTimeout(()=>r.remove(), 1000);
}

/* ═══════════════════════════════════════════════
   STATS RENDER
═══════════════════════════════════════════════ */
function renderStats(data){
  document.getElementById('statsLevel').textContent=`Уровень ${data.level}`;

  const streak=data.day_streak||0;
  const streakEl=document.getElementById('statsStreak');
  const streakIcon = streak>=14?'🔥':streak>=7?'🌟':streak>=3?'✨':'💫';
  streakEl.textContent=`${streak} дн. ${streakIcon}`;
  streakEl.classList.toggle('hot', streak>=7);

  // XP bar — animate from 0 after short delay
  const pct = data.xp_for_next_level > 0
    ? Math.min(100, Math.round(data.xp_in_level / data.xp_for_next_level * 100))
    : 100;
  const fill=document.getElementById('xpFill');
  fill.style.width='0%';
  setTimeout(()=>{ fill.style.width=pct+'%'; }, 400);
  document.getElementById('xpLabel').textContent=
    `${data.xp_in_level} / ${data.xp_for_next_level} XP`;

  // Week dots
  const dots=document.querySelectorAll('.week-dot');
  dots.forEach((d,i)=>{
    setTimeout(()=>d.classList.toggle('filled', i < (data.entries_this_week||0)), 600+i*120);
  });
  const left=Math.max(0,4-(data.entries_this_week||0));
  document.getElementById('weekLabel').textContent=
    left===0?'неделя засчитана ✓':`ещё ${left} ${left===1?'запись':'записи'} для стрика`;
}

/* ═══════════════════════════════════════════════
   IDLE VARIETY — occasionally wave or wink
═══════════════════════════════════════════════ */
function scheduleIdleCharm(){
  const delay = 8000 + Math.random()*12000;
  setTimeout(()=>{
    // Only if currently idle
    if(!alienWrap.classList.contains('eating') &&
       !alienWrap.classList.contains('celebrating') &&
       !alienWrap.classList.contains('sleeping') &&
       !alienWrap.classList.contains('levelup')){
      const pick = Math.random();
      if(pick < .4){
        // mini tap bounce
        alienWrap.style.animation='tap-squish .5s cubic-bezier(.34,1.56,.64,1)';
        spawnHearts(document.getElementById('particles'),3);
        setTimeout(()=>{ alienWrap.style.animation=''; }, 520);
      } else if(pick < .7){
        showMood(['✨','🌟','💫','❤️'][Math.floor(Math.random()*4)], 1400);
      }
    }
    scheduleIdleCharm();
  }, delay);
}

/* ═══════════════════════════════════════════════
   MAIN INIT
═══════════════════════════════════════════════ */
async function init(){
  const tg=window.Telegram?.WebApp;
  if(tg){ tg.ready(); tg.expand(); }

  const telegramId=getTelegramId();
  let data=null;

  if(telegramId){
    try{
      const r=await fetch(`${API_BASE}/api/pet/${telegramId}`,{headers:HDRS});
      if(r.ok) data=await r.json();
    } catch(e){
      console.warn('Pet API unavailable:',e);
    }
  }

  if(!data){
    data={level:1,xp:0,xp_in_level:0,xp_for_next_level:100,
          day_streak:0,entries_this_week:0,stage:2,env:0,animation:'idle'};
  }

  // Clamp stage to 1-5
  data.stage = Math.max(1, Math.min(5, data.stage||2));

  initStars(data.env||0, data.stage);
  applyEnv(data.env||0);
  applyStage(data.stage);
  renderStats(data);

  // Play animation after slight delay so reveal is smooth
  const anim = data.animation || 'idle';
  setTimeout(()=>playAnimation(anim), 650);

  // Schedule idle variety
  scheduleIdleCharm();

  // Hide loader
  const loader=document.getElementById('loading');
  setTimeout(()=>{
    loader.classList.add('done');
    setTimeout(()=>loader.remove(), 750);
  }, 300);
}

init();
</script>
